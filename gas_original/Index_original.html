<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Instrumento PYMES CONACYT</title>

<!-- Bootstrap 5 + Bootswatch (Lux) -->
<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  :root{
    /* Paleta viva y moderna */
    --accent: #ff2d55;           /* rosa intenso para selección */
    --accent-2: #7c3aed;         /* violeta para detalles */
    --primary-strong: #2563eb;   /* azul vivo */
    --success-strong: #10b981;   /* verde vivo */
  }

  body { background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); }

  .appbar{
    position: sticky; top: 0; z-index: 1030;
    backdrop-filter: saturate(120%) blur(6px);
    background: linear-gradient(90deg, rgba(255,255,255,.92) 0%, rgba(255,246,250,.92) 100%);
    border-bottom: 2px solid rgba(255,45,85,.25);
  }
  .container-narrow { max-width: 980px; }

  .card{
    border-radius: 1.1rem;
    border: 1px solid rgba(124, 58, 237, .12);
    box-shadow: 0 10px 28px rgba(16, 24, 40, .07);
  }
  .question-card{ margin-bottom: 1rem; }
  .question-card .card-body{ position: relative; }
  .question-card .card-body::before{
    content:""; position:absolute; top:-1px; left:0; right:0; height:4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-top-left-radius: 1.1rem; border-top-right-radius: 1.1rem;
  }

  .q-help{ color:#64748b; font-size:.9rem; }
  .sticky-actions{
    position: sticky; bottom: 0; z-index: 1030; padding: .75rem;
    background: rgba(255,255,255,.97); border-top: 1px solid #e2e8f0;
  }

  /* Progreso con color acentuado */
  .progress{ height: .6rem; }
  .progress-bar{ background-color: var(--accent) !important; }

  .required:after{ content:" *"; color:var(--accent); font-weight:600; }

  /* Botones */
  .btn { margin: 2px; }
  .btn-accent{
    color:#fff; background-color: var(--accent); border-color: var(--accent);
  }
  .btn-accent:hover{ filter: brightness(0.93); }
  .btn-outline-primary{ border-color: var(--primary-strong); color: var(--primary-strong); }
  .btn-outline-primary:hover{ background-color: var(--primary-strong); color:#fff; }

  /* Likert 1..7 en rejilla uniforme */
  .likert-group{
    display: grid !important; grid-template-columns: repeat(7, minmax(44px, 1fr)); gap: 8px;
  }
  .likert-group .btn{ width:100%; text-align:center; }

  /* Selección MUY visible */
  .likert-group .btn-check:checked + label,
  .btn-group .btn-check:checked + label{
    background: linear-gradient(180deg, var(--accent), #ff4d78);
    color: #fff !important; border-color: var(--accent) !important;
    box-shadow: 0 0 0 .25rem rgba(255,45,85,.25) !important;
    transform: translateY(-1px);
  }
  .btn-group .btn:focus, .likert-group .btn:focus{
    outline: none; box-shadow: 0 0 0 .25rem rgba(37,99,235,.18);
  }

  .pill{ display:inline-flex; align-items:center; gap:.5rem; padding:.35rem .7rem;
         border-radius:999px; background:#eef2ff; color:#3730a3; font-size:.9rem; }

  .step-indicator{ font-weight:600; font-variant-numeric: tabular-nums; }

  /* === Tipografía y tamaños fluidos (mejoras de legibilidad) === */
  html { 
    font-size: clamp(17px, 2.2vw, 19px);
  }
  body { 
    -webkit-text-size-adjust: 100%; 
    text-size-adjust: 100%;
  }

  /* Títulos y encabezados de bloque */
  h5, .card h5, .step-indicator {
    font-size: clamp(1.25rem, 2.8vw, 1.5rem);
  }

  /* Subtítulos de grupos dentro de cada bloque */
  .card .fw-semibold {
    font-size: clamp(1.05rem, 2.6vw, 1.25rem);
  }

  /* Texto de pregunta y ayudas */
  .form-label {
    font-size: clamp(1.05rem, 2.8vw, 1.25rem);
    line-height: 1.35;
  }
  .q-help {
    font-size: clamp(.95rem, 2.2vw, 1.05rem);
  }

  /* Campos de entrada */
  .form-control, .input-group-text, textarea.form-control {
    font-size: 1.05rem;
    padding: .7rem .85rem;
  }

  /* Botones (incluye Likert y Sí/No) */
  .btn {
    font-size: clamp(1rem, 2.6vw, 1.15rem);
    padding: .6rem .9rem;
  }
  .likert-group .btn {
    padding: .55rem 0;
  }
  .likert-group label.btn {
    font-weight: 600;
  }

  /* Contenedor móvil a ancho completo y márgenes adecuados */
  @media (max-width: 576px) {
    .container-narrow { 
      max-width: 100%; 
      padding-left: 12px; 
      padding-right: 12px; 
    }
    .card { border-radius: 1rem; }
    .step-indicator { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<header class="appbar py-2">
  <div class="container container-narrow d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-clipboard2-pulse-fill fs-4 text-primary"></i>
      <div>
        <div class="fw-bold">Instrumento PYMES CONACYT</div>
        <div class="text-muted small">Capacidad de absorción, digitalización y desempeño</div>
      </div>
    </div>
    <div class="pill"><i class="bi bi-phone"></i><span>Optimizado para móviles</span></div>
  </div>
</header>

<main class="container container-narrow my-3">
  <div class="card">
    <div class="card-body">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="step-indicator">
          <span id="stepNo">1</span>/<span id="stepTotal">9</span> · <span id="stepTitle">Bloque I</span>
        </div>
        <div style="min-width:220px">
          <div class="progress" role="progressbar" aria-label="Avance" aria-valuemin="0" aria-valuemax="100">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <form id="formRoot" class="needs-validation" novalidate></form>
    </div>

    <div class="sticky-actions d-flex gap-2 justify-content-between">
      <button id="btnPrev" class="btn btn-outline-secondary" type="button">
        <i class="bi bi-arrow-left-circle"></i> Anterior
      </button>
      <div class="d-flex gap-2">
        <button id="btnSave" class="btn btn-success" type="button">
          <i class="bi bi-check2-circle"></i> Enviar respuestas
        </button>
        <button id="btnNext" class="btn btn-primary" type="button">
          Siguiente <i class="bi bi-arrow-right-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Avisos -->
  <div id="toast" class="alert mt-3 d-none" role="alert"></div>
</main>

<!-- Modal de Éxito -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:linear-gradient(90deg,var(--success-strong),#34d399);">
        <h5 class="modal-title text-white"><i class="bi bi-check-circle-fill me-2"></i>Datos guardados</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <p class="mb-1">Se registró el envío correctamente.</p>
        <p class="mb-2"><strong id="successCode"></strong></p>
        <p class="mb-0 text-muted">Puede cerrar esta ventana o comenzar <strong>otra respuesta</strong> con el botón de abajo.</p>
      </div>
      <div class="modal-footer">
        <button id="btnNewResponse" type="button" class="btn btn-accent">
          <i class="bi bi-plus-circle"></i> Nueva respuesta
        </button>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->

/* ====================== ESTADO Y META ======================= */
let currentStep = 0;
let autoAdvanceTimer = null;
const steps = SCHEMA.map(b => b.id);
const answers = {};
const META = indexSchema();
const ALL_CODES = Object.keys(META);

/* ====================== INICIALIZACIÓN ====================== */
document.addEventListener('DOMContentLoaded', () => {
  renderStep(); updateStepHeader(); updateProgress();

  document.getElementById('btnPrev').addEventListener('click', onPrev);
  document.getElementById('btnNext').addEventListener('click', onNext);
  document.getElementById('btnSave').addEventListener('click', onSave);
  document.getElementById('btnNewResponse').addEventListener('click', resetForNewResponse);

  // Delegación para persistir cambios y auto-avance
  document.getElementById('formRoot').addEventListener('change', onAnyChange, true);
});

/* ============================ RENDER ======================= */
function renderStep(){
  const root = document.getElementById('formRoot'); root.innerHTML='';
  const block = SCHEMA[currentStep]; const frag = document.createDocumentFragment();

  const h = document.createElement('h5'); h.textContent = block.title; h.className='mb-3'; frag.appendChild(h);

  if (block.items) for (const it of block.items) frag.appendChild(renderItemCard(it, block.id));
  if (block.groups){
    for (const g of block.groups){
      const gc = document.createElement('div'); gc.className='question-card card mb-3';
      gc.innerHTML = `<div class="card-body"><div class="fw-semibold mb-2">${g.gtitle}</div>
                      <div class="d-flex flex-column gap-3" data-group="${g.gcode}"></div></div>`;
      const holder = gc.querySelector('[data-group]');
      for (const it of g.items) holder.appendChild(renderItemControl(it, block.id));
      frag.appendChild(gc);
    }
  }
  root.appendChild(frag);
  restoreValuesInDOM();
}

function renderItemCard(item, bloqueId){
  const wrap = document.createElement('div'); wrap.className='question-card card';
  const req = item.required ? 'required' : '';
  wrap.innerHTML = `<div class="card-body">
      <label class="form-label ${req}">${item.text}</label>
      ${item.help ? `<div class="q-help mb-2">${item.help}</div>` : ''}
      <div data-code="${item.code}"></div>
    </div>`;
  const holder = wrap.querySelector('[data-code]');
  holder.appendChild(renderControlByType(item));
  return wrap;
}

function renderItemControl(item){
  const wrap = document.createElement('div');
  const req = item.required ? 'required' : '';
  wrap.innerHTML = `<label class="form-label ${req}">${item.text}</label>
                    ${item.help ? `<div class="q-help mb-1">${item.help}</div>` : ''}`;
  wrap.appendChild(renderControlByType(item));
  return wrap;
}

function renderControlByType(item){
  const id = item.code; let node;
  switch (item.type){
    case 'text':
      node = html(`<input type="text" class="form-control" id="${id}" ${item.required?'required':''} />`);
      break;
    case 'number':
      node = html(`<input type="number" class="form-control" id="${id}" ${item.required?'required':''} />`);
      break;
    case 'percent':
      node = html(`<div class="input-group">
        <input type="number" class="form-control" id="${id}" min="0" max="100" step="1" ${item.required?'required':''} />
        <span class="input-group-text">%</span></div>`);
      break;
    case 'textarea':
      node = html(`<textarea class="form-control" id="${id}" rows="4" placeholder="Escriba aquí..."></textarea>`);
      break;
    case 'yn':
      node = renderButtonRadio(id, ['1','0'], ['Sí','No']);
      break;
    case 'gender':
      node = renderButtonRadio(id, ['1','2'], ['Hombre','Mujer']);
      break;
    case 'likert7':
      node = renderLikert7(id);
      break;
    case 'choice': {
      const vals = (item.options && item.options.values) ? item.options.values : [];
      const lbls = (item.options && item.options.labels) ? item.options.labels : vals;
      node = renderButtonRadio(id, vals, lbls);
      break;
    }
    default:
      node = html(`<input type="text" class="form-control" id="${id}" />`);
  }
  node.dataset.code = item.code; node.dataset.qtext = item.text; node.dataset.block = META[item.code]?.block || '';
  return node;
}

/* === Radios como botones === */
function createRadioPair({name, value, labelText}){
  const inpid = `${name}_${value}`;
  const input = document.createElement('input');
  input.type='radio'; input.className='btn-check'; input.name=name; input.id=inpid; input.value=value;
  const label = document.createElement('label');
  label.className='btn btn-outline-secondary'; label.setAttribute('for', inpid); label.textContent=labelText;
  const frag = document.createDocumentFragment(); frag.appendChild(input); frag.appendChild(label); return frag;
}
function renderButtonRadio(id, values, labels){
  const grp = document.createElement('div'); grp.className='btn-group flex-wrap'; grp.setAttribute('role','group');
  values.forEach((v,i)=> grp.appendChild(createRadioPair({name:id, value:String(v), labelText:String(labels[i] ?? v)})));
  return grp;
}
function renderLikert7(id){
  const grp = document.createElement('div'); grp.className='likert-group btn-pill'; grp.setAttribute('role','group');
  for (let v=1; v<=7; v++) grp.appendChild(createRadioPair({name:id, value:String(v), labelText:String(v)}));
  return grp;
}

/* ====================== PERSISTENCIA / CAMBIOS =============== */
function onAnyChange(e){
  const target = e.target; if (!target) return;
  const holder = target.closest('[data-code]') || target.parentElement?.closest('[data-code]'); if (!holder) return;
  const code = holder.dataset.code; let value = '';

  if (target.matches('input[type="radio"]')){
    const sel = document.querySelector(`input[name="${target.name}"]:checked`);
    if (sel) value = sel.value;
    answers[code] = value; updateProgress(); scheduleAutoAdvance(code);
  } else {
    const inner = holder.matches('input, textarea') ? holder : holder.querySelector('input, textarea');
    if (inner){ answers[code] = inner.value ?? ''; updateProgress(); }
  }
}

function restoreValuesInDOM(){
  document.querySelectorAll('[data-code]').forEach(node=>{
    const code = node.dataset.code; const val = answers[code];
    if (node.querySelector('input[type="radio"]')){
      if (val !== undefined && val !== ''){
        const match = node.querySelector(`input[type="radio"][name="${code}"][value="${val}"]`);
        if (match) match.checked = true;
      }
    } else {
      const inp = node.matches('input, textarea') ? node : node.querySelector('input, textarea');
      if (inp && val !== undefined) inp.value = val;
    }
  });
}

/* ====================== NAVEGACIÓN / PROGRESO ================ */
function onPrev(){ if (currentStep>0){ currentStep--; renderStep(); updateStepHeader(); updateProgress(); } }
function onNext(){ if (currentStep<SCHEMA.length-1){ currentStep++; renderStep(); updateStepHeader(); updateProgress(); } }

function updateStepHeader(){
  document.getElementById('stepNo').textContent = (currentStep+1);
  document.getElementById('stepTotal').textContent = SCHEMA.length;
  document.getElementById('stepTitle').textContent = SCHEMA[currentStep].title.trim();
}

function allRequiredCodes(){
  const out=[]; for (const b of SCHEMA){
    if (b.items) b.items.forEach(it=>{ if(it.required) out.push(it.code); });
    if (b.groups) b.groups.forEach(g=> g.items.forEach(it=>{ if(it.required) out.push(it.code); }));
  } return out;
}
function updateProgress(){
  const req = allRequiredCodes(); const ans = req.filter(k => (answers[k] ?? '') !== '');
  const pct = req.length ? Math.round(ans.length*100/req.length) : 0;
  const bar = document.getElementById('progressBar'); bar.style.width = pct+'%'; bar.textContent = pct+'%';
}

/* ====================== AUTO-AVANCE ========================== */
function scheduleAutoAdvance(code){
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(()=>{
    const all = Array.from(document.querySelectorAll('[data-code]'));
    const idx = all.findIndex(n => n.dataset.code === code);
    const next = (idx>=0 && idx+1<all.length) ? all[idx+1] : null;
    if (next){
      next.scrollIntoView({behavior:'smooth', block:'center'});
      const lbl = next.querySelector('label.btn'); if (lbl) lbl.focus();
    } else { onNext(); }
  }, 1000);
}

/* ====================== PAYLOAD / VALIDACIONES =============== */
function indexSchema(){
  const meta={};
  for (const b of SCHEMA){
    if (b.items) b.items.forEach(it=> meta[it.code]={block:b.id, text:it.text});
    if (b.groups) b.groups.forEach(g=> g.items.forEach(it=> meta[it.code]={block:b.id, text:it.text}));
  }
  return meta;
}

function buildPayload(){
  const header=[]; const wide={}; const long=[];
  ALL_CODES.forEach(code=>{ header.push(code); wide[code]=answers[code] ?? ''; });
  ALL_CODES.forEach(code=>{
    const m=META[code]||{block:'',text:''}; long.push(['','',m.block,code,m.text,answers[code] ?? '']);
  });
  return { header, wide, long };
}

function validatePercents(wide){
  const a = Number(wide['B1_Q9_propMujPct'] || 0);
  const b = Number(wide['B1_Q9_propHomPct'] || 0);
  if (!Number.isFinite(a) || !Number.isFinite(b)) return 'Propiedad de mujeres/hombres debe ser numérica.';
  if (a<0 || a>100 || b<0 || b>100) return 'Los porcentajes deben estar entre 0 y 100.';
  if ((a+b)!==100) return 'Mujeres% + Hombres% debe ser exactamente 100.';
  return '';
}

function toast(kind,msg){
  const el=document.getElementById('toast');
  el.className='alert mt-3 alert-'+kind; el.textContent=msg;
  el.classList.remove('d-none'); setTimeout(()=> el.classList.add('d-none'), 6000);
}

/* ============================== ENVÍO ======================= */
function onSave(){
  // Validación del bloque visible
  const form = document.getElementById('formRoot');
  const invalid = form.querySelector(':invalid');
  if (invalid){ invalid.scrollIntoView({behavior:'smooth', block:'center'}); toast('warning','Complete los campos requeridos del bloque actual.'); return; }

  const {header, wide, long} = buildPayload();
  const msg = validatePercents(wide); if (msg){ toast('warning', msg); return; }

  const submissionId = 'SUB-' + Date.now();
  if (typeof google !== 'undefined' && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(res=>{
        if (res && res.ok){
          // Modal de éxito con opción de nueva respuesta
          const codeEl = document.getElementById('successCode');
          codeEl.textContent = 'Código de registro: ' + (res.submissionId || submissionId);
          const m = new bootstrap.Modal(document.getElementById('successModal')); m.show();
        } else {
          toast('danger','Error al guardar: ' + (res?.error ?? 'desconocido'));
        }
      })
      .withFailureHandler(err=>{ toast('danger','Error de red/servidor: ' + (err?.message ?? err)); })
      .saveResponse({ submissionId, header, wide, long });
  } else {
    toast('danger','Contexto de Apps Script no disponible.');
  }
}

function resetForNewResponse(){
  const modalEl = document.getElementById('successModal');
  const m = bootstrap.Modal.getInstance(modalEl); if (m) m.hide();

  // Limpiar estado y volver al inicio
  for (const k of ALL_CODES) delete answers[k];
  currentStep = 0; renderStep(); updateStepHeader(); updateProgress();
}

/* ========================== UTIL =========================== */
function html(s){ const t=document.createElement('template'); t.innerHTML=s.trim(); return t.content.firstChild; }
</script>
